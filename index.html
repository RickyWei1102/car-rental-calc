<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大順租車試算表</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4">

    <div id="app" class="w-full max-w-md mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-gradient-to-r from-blue-800 to-indigo-950 p-8 text-center text-white">
            <h1 class="text-2xl font-black tracking-widest mb-1">大順租車試算表</h1>
            <div class="h-1 w-12 bg-yellow-400 mx-auto rounded-full mb-2"></div>
            <p class="text-xs opacity-80 font-light italic">計算透明 · 專業服務</p>
        </div>

        <div class="p-6 space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">車輛等級</label>
                    <select v-model="selectedRank" class="w-full bg-gray-50 border-2 border-gray-100 rounded-xl p-3 font-bold text-gray-700 outline-none focus:border-blue-500">
                        <option v-for="(data, rank) in rates" :key="rank" :value="rank">{{ rank }}</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">使用者身分</label>
                    <select v-model="identity" class="w-full bg-gray-50 border-2 border-gray-100 rounded-xl p-3 font-medium text-gray-700 outline-none">
                        <option value="member">會員</option>
                        <option v-if="rates[selectedRank].nonMember" value="nonMember">非會員</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">租借時段</label>
                    <select v-model="dayType" class="w-full bg-gray-50 border-2 border-gray-100 rounded-xl p-3 font-medium text-gray-700 outline-none">
                        <option value="weekday">平日</option>
                        <option value="holiday">假日</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">租借天數</label>
                    <input type="number" v-model.number="days" min="1" class="w-full bg-gray-50 border-2 border-gray-100 rounded-xl p-3 font-bold text-gray-700 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">預計里程 (km)</label>
                    <input type="number" v-model.number="km" min="0" class="w-full bg-gray-50 border-2 border-gray-100 rounded-xl p-3 font-bold text-gray-700 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 gap-2 pt-2">
                <label class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border-2 transition-all cursor-pointer" :class="includeInsurance ? 'border-blue-200 bg-blue-50' : 'border-transparent'">
                    <div class="flex items-center space-x-3 text-sm font-bold text-gray-700">
                        <input type="checkbox" v-model="includeInsurance" class="w-4 h-4 rounded text-blue-600">
                        <span>加購財損專案</span>
                    </div>
                    <span class="text-xs font-black text-blue-600">${{ insurancePrice }}</span>
                </label>
                
                <div class="grid grid-cols-2 gap-2">
                    <label class="flex items-center space-x-2 p-3 bg-slate-50 rounded-xl border-2 transition-all cursor-pointer" :class="earlyPick ? 'border-orange-200 bg-orange-50' : 'border-transparent'">
                        <input type="checkbox" v-model="earlyPick" class="w-4 h-4 text-orange-600">
                        <span class="text-xs font-bold text-gray-700">0900提前取車</span>
                    </label>
                    <label class="flex items-center space-x-2 p-3 bg-slate-50 rounded-xl border-2 transition-all cursor-pointer" :class="lateReturn ? 'border-orange-200 bg-orange-50' : 'border-transparent'">
                        <input type="checkbox" v-model="lateReturn" class="w-4 h-4 text-orange-600">
                        <span class="text-xs font-bold text-gray-700">2100延後還車</span>
                    </label>
                </div>
            </div>

            <div class="mt-6 bg-slate-900 rounded-3xl p-6 text-white shadow-lg space-y-4">
                <div class="space-y-1">
                    <div class="flex justify-between text-xs opacity-60">
                        <span>基礎費用 ({{ basePrice }} x {{ days }}天)</span>
                        <span>${{ basePrice * days }}</span>
                    </div>
                    <div class="flex justify-between text-xs opacity-60">
                        <span>里程費用 ({{ km }} km)</span>
                        <span>${{ kmCost }}</span>
                    </div>
                    <div class="bg-slate-800 p-2 rounded text-[10px] text-yellow-200 font-mono leading-tight">
                        里程計算：{{ kmFormula }}
                    </div>
                    <div v-if="earlyPick || lateReturn" class="flex justify-between text-xs opacity-60">
                        <span>特殊時段加收</span>
                        <span>${{ (earlyPick ? 200 : 0) + (lateReturn ? 200 : 0) }}</span>
                    </div>
                </div>

                <div class="flex justify-between items-end border-t border-slate-700 pt-4">
                    <div>
                        <p class="text-[10px] uppercase tracking-widest opacity-40 font-bold">Grand Total</p>
                        <p class="text-sm font-bold text-blue-300">應付總額</p>
                    </div>
                    <div class="text-4xl font-black text-yellow-400">
                        <span class="text-sm mr-1">$</span>{{ totalPrice }}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    selectedRank: '大師級',
                    identity: 'member',
                    dayType: 'weekday',
                    days: 1,
                    km: 0,
                    includeInsurance: false,
                    earlyPick: false,
                    lateReturn: false,
                    rates: {
                        '永恆傳說': { member: { weekday: 1000, holiday: 1100, km: [13, 10, 7], ins: 1000 } },
                        '王者級': { member: { weekday: 700, holiday: 850, km: [10, 8, 6], ins: 500 } },
                        '大師級': { 
                            member: { weekday: 650, holiday: 800, km: [8, 6, 4], ins: 500 },
                            nonMember: { weekday: 750, holiday: 900, km: [10, 7, 5], ins: 1000 }
                        },
                        '鑽石級': { 
                            member: { weekday: 600, holiday: 750, km: [7, 5, 3], ins: 400 },
                            nonMember: { weekday: 700, holiday: 850, km: [9, 6, 4], ins: 700 }
                        },
                        '柏金級': { 
                            member: { weekday: 550, holiday: 700, km: [6, 4, 3], ins: 300 },
                            nonMember: { weekday: 650, holiday: 800, km: [8, 5, 4], ins: 600 }
                        },
                        '黃金級': { 
                            member: { weekday: 500, holiday: 650, km: [3, 3, 3], ins: 200 },
                            nonMember: { weekday: 600, holiday: 750, km: [4, 4, 4], ins: 600 }
                        },
                        '白銀級': { 
                            member: { weekday: 450, holiday: 450, km: [2, 2, 2], ins: 200 },
                            nonMember: { weekday: 550, holiday: 550, km: [3, 3, 3], ins: 600 }
                        },
                        '青銅級': { 
                            member: { weekday: 400, holiday: 400, km: [2, 2, 2], ins: 200 },
                            nonMember: { weekday: 500, holiday: 500, km: [3, 3, 3], ins: 600 }
                        }
                    }
                }
            },
            computed: {
                basePrice() {
                    return this.dayType === 'weekday' ? this.rates[this.selectedRank][this.identity].weekday : this.rates[this.selectedRank][this.identity].holiday;
                },
                insurancePrice() {
                    return this.rates[this.selectedRank][this.identity].ins;
                },
                kmFormula() {
                    const r = this.rates[this.selectedRank][this.identity].km;
                    const d = Math.max(0, this.km);
                    if (d <= 100) return `${d}km × $${r[0]}`;
                    if (d <= 200) return `(100km × $${r[0]}) + (${d-100}km × $${r[1]})`;
                    return `(100km × $${r[0]}) + (100km × $${r[1]}) + (${d-200}km × $${r[2]})`;
                },
                kmCost() {
                    const r = this.rates[this.selectedRank][this.identity].km;
                    const d = Math.max(0, this.km);
                    if (d <= 100) return d * r[0];
                    if (d <= 200) return (100 * r[0]) + (d - 100) * r[1];
                    return (100 * r[0]) + (100 * r[1]) + (d - 200) * r[2];
                },
                totalPrice() {
                    let total = (this.basePrice * this.days) + this.kmCost;
                    if (this.includeInsurance) total += this.insurancePrice;
                    if (this.earlyPick) total += 200;
                    if (this.lateReturn) total += 200;
                    return total;
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
