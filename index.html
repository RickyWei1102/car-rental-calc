<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大順租車試算表</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-font-smoothing: antialiased; }
        select, input { font-size: 1.25rem !important; height: 3.5rem !important; font-weight: 700 !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-2 sm:p-4">

    <div id="app" class="w-full max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-200">
        <div class="bg-gradient-to-br from-blue-800 to-indigo-950 p-8 text-center text-white">
            <h1 class="text-3xl font-black tracking-widest mb-1">大順租車試算表</h1>
            <div class="h-1.5 w-16 bg-yellow-400 mx-auto rounded-full mb-2"></div>
            <p class="text-xs opacity-80 font-medium">里程計費 · 透明公開</p>
        </div>

        <div class="p-6 space-y-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-500 mb-1 ml-1">車輛等級</label>
                    <select v-model="selectedRank" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 text-gray-800 outline-none focus:border-blue-500">
                        <option v-for="(data, rank) in rates" :key="rank" :value="rank">{{ rank }}</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-500 mb-1 ml-1">身分</label>
                        <select v-model="identity" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 text-gray-800 outline-none">
                            <option value="member">會員</option>
                            <option v-if="rates[selectedRank].nonMember" value="nonMember">非會員</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-500 mb-1 ml-1">時段</label>
                        <select v-model="dayType" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 text-gray-800 outline-none">
                            <option value="weekday">平日</option>
                            <option value="holiday">假日</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-500 mb-1 ml-1">租借天數</label>
                        <input type="number" v-model.number="days" min="1" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 text-gray-800 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-500 mb-1 ml-1">行駛里程 (KM)</label>
                        <input type="number" v-model.number="km" min="0" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 text-gray-800 outline-none">
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border-2 transition-all cursor-pointer" :class="includeInsurance ? 'border-blue-400 bg-blue-50' : 'border-transparent'">
                    <div class="flex items-center space-x-3 text-lg font-bold text-gray-700">
                        <input type="checkbox" v-model="includeInsurance" class="w-6 h-6 text-blue-600 rounded">
                        <span>加購財損專案</span>
                    </div>
                    <span class="text-lg font-black text-blue-600">${{ insurancePrice }}</span>
                </label>
                
                <div class="grid grid-cols-2 gap-2">
                    <label class="flex flex-col items-center p-3 bg-slate-50 rounded-xl border-2 transition-all cursor-pointer" :class="earlyPick ? 'border-orange-400 bg-orange-50' : 'border-transparent'">
                        <input type="checkbox" v-model="earlyPick" class="mb-1 w-6 h-6 text-orange-600 rounded">
                        <span class="text-[11px] font-bold text-gray-600">0900前提車</span>
                        <span class="text-[10px] font-black text-orange-600">+$200</span>
                    </label>
                    <label class="flex flex-col items-center p-3 bg-slate-50 rounded-xl border-2 transition-all cursor-pointer" :class="lateReturn ? 'border-orange-400 bg-orange-50' : 'border-transparent'">
                        <input type="checkbox" v-model="lateReturn" class="mb-1 w-6 h-6 text-orange-600 rounded">
                        <span class="text-[11px] font-bold text-gray-600">2100後還車</span>
                        <span class="text-[10px] font-black text-orange-600">+$200</span>
                    </label>
                </div>
            </div>

            <div class="mt-8 bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl space-y-5">
                <div class="space-y-2 border-b border-slate-700 pb-4 text-base opacity-90">
                    <div class="flex justify-between"><span>基礎車資：</span><span>${{ basePrice * days }}</span></div>
                    <div class="flex justify-between text-yellow-100"><span>里程車資：</span><span>${{ kmCost }}</span></div>
                    <div v-if="earlyPick || lateReturn || includeInsurance" class="flex justify-between text-blue-300">
                        <span>附加費小計：</span>
                        <span>${{ (earlyPick?200:0) + (lateReturn?200:0) + (includeInsurance?insurancePrice:0) }}</span>
                    </div>
                </div>

                <div class="bg-indigo-950 p-4 rounded-2xl border border-indigo-800">
                    <p class="text-[10px] text-indigo-300 font-black mb-2 uppercase tracking-widest">里程費公式詳情：</p>
                    <p class="text-sm text-yellow-400 font-mono font-bold leading-tight break-all">
                        {{ kmFormula }} = ${{ kmCost }}
                    </p>
                </div>

                <div class="flex justify-between items-center pt-2">
                    <span class="text-2xl font-bold text-gray-300">應付總額</span>
                    <div class="text-5xl font-black text-yellow-400 tracking-tighter">
                        <span class="text-2xl mr-1 font-bold">$</span>{{ totalPrice }}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    selectedRank: '大師級', identity: 'member', dayType: 'weekday', days: 1, km: 0,
                    includeInsurance: false, earlyPick: false, lateReturn: false,
                    rates: {
                        '永恆傳說': { member: { weekday: 1000, holiday: 1100, km: [13, 10, 7], ins: 1000 } },
                        '王者級': { member: { weekday: 700, holiday: 850, km: [10, 8, 6], ins: 500 } },
                        '大師級': { member: { weekday: 650, holiday: 800, km: [8, 6, 4], ins: 500 }, nonMember: { weekday: 750, holiday: 900, km: [10, 7, 5], ins: 1000 } },
                        '鑽石級': { member: { weekday: 600, holiday: 750, km: [7, 5, 3], ins: 400 }, nonMember: { weekday: 700, holiday: 850, km: [9, 6, 4], ins: 700 } },
                        '柏金級': { member: { weekday: 550, holiday: 700, km: [6, 4, 3], ins: 300 }, nonMember: { weekday: 650, holiday: 800, km: [8, 5, 4], ins: 600 } },
                        '黃金級': { member: { weekday: 500, holiday: 650, km: [3, 3, 3], ins: 200 }, nonMember: { weekday: 600, holiday: 750, km: [4, 4, 4], ins: 600 } },
                        '白銀級': { member: { weekday: 450, holiday: 450, km: [2, 2, 2], ins: 200 }, nonMember: { weekday: 550, holiday: 550, km: [3, 3, 3], ins: 600 } },
                        '青銅級': { member: { weekday: 400, holiday: 400, km: [2, 2, 2], ins: 200 }, nonMember: { weekday: 500, holiday: 500, km: [3, 3, 3], ins: 600 } }
                    }
                }
            },
            computed: {
                basePrice() { const d = this.rates[this.selectedRank][this.identity]; return this.dayType === 'weekday' ? d.weekday : d.holiday; },
                insurancePrice() { return this.rates[this.selectedRank][this.identity].ins; },
                kmFormula() {
                    const r = this.rates[this.selectedRank][this.identity].km;
                    const d = Math.max(0, this.km);
                    if (d <= 100) return `(${d}x$${r[0]})`;
                    if (d <= 200) return `(100x$${r[0]}) + (${d-100}x$${r[1]})`;
                    // 修正此處：第三段應為總里程減去 200
                    return `(100x$${r[0]}) + (100x$${r[1]}) + (${d-200}x$${r[2]})`;
                },
                kmCost() {
                    const r = this.rates[this.selectedRank][this.identity].km;
                    const d = Math.max(0, this.km);
                    if (d <= 100) return d * r[0];
                    if (d <= 200) return (100 * r[0]) + (d - 100) * r[1];
                    return (100 * r[0]) + (100 * r[1]) + (d - 200) * r[2];
                },
                totalPrice() {
                    let t = (this.basePrice * this.days) + this.kmCost;
                    if (this.includeInsurance) t += this.insurancePrice;
                    if (this.earlyPick) t += 200;
                    if (this.lateReturn) t += 200;
                    return t;
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
